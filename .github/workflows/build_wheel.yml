- name: Build xformers wheel
        run: |
          export PATH="/usr/local/cuda/bin:$PATH"
          export TORCH_CUDA_ARCH_LIST="7.0;7.5;8.0;8.6;9.0;12.0"
          export FORCE_CUDA=1
          python3.10 -m pip wheel --no-deps --no-build-isolation \
            --wheel-dir /tmp/wheels/ \
            xformers==0.0.29
