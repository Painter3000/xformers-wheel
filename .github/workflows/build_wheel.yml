name: Build xformers Wheel
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.8.0-devel-ubuntu22.04
    steps:
      - name: Install Python 3.10 and tools
        run: |
          apt-get update -y
          apt-get install -y git python3.10 python3.10-dev python3-pip curl
          curl -sS https://bootstrap.pypa.io/get-pip.py | python3.10
          python3.10 -m pip install --upgrade pip
          python3.10 -m pip install torch==2.8.0 torchvision==0.23.0 --index-url https://download.pytorch.org/whl/cu128
          python3.10 -m pip install wheel setuptools ninja
      - name: Create output directory
        run: mkdir -p /tmp/wheels/
      - name: Build wheel
        run: |
          export PATH="/usr/local/cuda/bin:$PATH"
          export TORCH_CUDA_ARCH_LIST="8.6;9.0;12.0"
          export FORCE_CUDA=1
          python3.10 -m pip wheel --no-deps --no-build-isolation \
            --wheel-dir /tmp/wheels/ \
            git+https://github.com/facebookresearch/xformers.git@v0.0.32       
      - name: List built wheels
        run: ls -la /tmp/wheels/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          name: xformers-cp310-cu128
          path: /tmp/wheels/*.whl
